<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- APP VERSION — bump this number on every deploy to bust Safari home screen cache -->
<meta name="app-version" content="2.0">
<title>Training Log v2.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: #2a2a2a; --accent: #e8ff3a; --accent2: #ff6b35;
    --text: #f0f0f0; --muted: #aaa; --done: #3aff8a; --warn: #ffb830;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; height: 100%; overflow: hidden; position: fixed; width: 100%; }
  .screen { display: none; height: 100dvh; overflow-y: auto; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── HOME ── */
  .home-header { padding: 16px 24px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .home-header h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 36px; text-transform: uppercase; line-height: 1; }
  .home-header h1 span { color: var(--accent); }
  .home-header p { margin-top: 6px; font-size: 13px; color: var(--muted); }
  .sync-status { font-size: 11px; margin-top: 4px; }
  .sync-status.ok   { color: var(--done); }
  .sync-status.err  { color: var(--accent2); }
  .sync-status.busy { color: var(--warn); }
  .week-list { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
  .cycle-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); padding: 8px 4px 4px; }
  .week-btn { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; width: 100%; text-align: left; gap: 14px; }
  .week-btn.deload { opacity: 0.7; }
  .week-btn.complete { border-color: var(--done); }
  .week-btn.current  { border-color: var(--accent); }
  .week-btn:active { opacity: 0.6; }
  .week-num { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 900; color: var(--muted); line-height: 1; min-width: 32px; }
  .week-btn.current .week-num  { color: var(--accent); }
  .week-btn.complete .week-num { color: var(--done); }
  .week-info { flex: 1; }
  .week-type { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .week-dots { display: flex; gap: 5px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
  .dot.done    { background: var(--done); }
  .dot.partial { background: var(--accent2); }

  /* ── SESSION ── */
  .session-header { padding: 16px 20px 12px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; flex-shrink: 0; }
  .back-btn { background: none; border: 1px solid #555; color: var(--text); border-radius: 8px; padding: 6px 10px; font-size: 18px; cursor: pointer; margin-top: 2px; flex-shrink: 0; }
  .reset-btn { background: none; border: 1px solid #555; color: var(--muted); border-radius: 8px; padding: 6px 10px; font-size: 12px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; flex-shrink: 0; margin-top: 2px; }
  .reset-btn:active { background: #2a2a2a; }
  .session-title { flex: 1; }
  .session-title h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 900; text-transform: uppercase; line-height: 1; }
  .session-title h2 span { color: var(--accent); }
  .session-title p { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .day-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .day-tab { flex: 1; padding: 8px 8px; background: none; border: none; border-bottom: 3px solid transparent; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .day-tab.active   { color: var(--accent); border-bottom-color: var(--accent); }
  .day-tab.day-done { color: var(--done);   border-bottom-color: var(--done); }
  .day-tab .tab-check { font-size: 12px; opacity: 0; }
  .day-tab.day-done .tab-check { opacity: 1; }
  .ex-nav { display: flex; gap: 6px; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
  .ex-nav::-webkit-scrollbar { display: none; }
  .ex-pill { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 12px; border-radius: 20px; border: 1px solid #555; background: none; color: var(--muted); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .ex-pill.active    { background: var(--accent); color: #000; border-color: var(--accent); }
  .ex-pill.done-pill { border-color: var(--done); color: var(--done); }
  .ex-content { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .ex-name { font-family: 'Barlow Condensed', sans-serif; font-size: 42px; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; line-height: 1; }
  .sets-container { display: flex; flex-direction: column; gap: 10px; }
  .set-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 16px; }
  .set-card.set-done { border-color: var(--done); }
  .set-left { flex: 1; }
  .set-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .set-weight { font-family: 'Barlow Condensed', sans-serif; font-size: 34px; font-weight: 900; line-height: 1.1; color: var(--accent); }
  .set-target { font-size: 13px; color: var(--muted); margin-top: 1px; }
  .rep-counter { display: flex; align-items: center; background: var(--surface2); border-radius: 10px; overflow: hidden; flex-shrink: 0; }
  .rep-btn { width: 44px; height: 52px; background: none; border: none; color: #ccc; font-size: 24px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .rep-btn:active { background: #333; }
  .rep-display { width: 48px; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 900; color: var(--muted); border-left: 1px solid #444; border-right: 1px solid #444; line-height: 52px; }
  .rep-display.has-reps { color: var(--done); }
  .pullup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .pullup-header { margin-bottom: 14px; }
  .pullup-target-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .pullup-target-val { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 900; color: var(--accent2); line-height: 1; margin: 2px 0 4px; }
  .pullup-band-tag { display: inline-block; font-size: 12px; color: #ccc; background: var(--surface2); border: 1px solid #444; border-radius: 6px; padding: 3px 8px; margin-top: 2px; }
  .pullup-sets { display: flex; flex-direction: column; gap: 10px; }
  .pullup-set  { display: flex; align-items: center; gap: 12px; }
  .pullup-set-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); min-width: 42px; }
  .pullup-total { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .pullup-total-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .pullup-total-val   { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 900; color: var(--accent2); }
  .session-footer { padding: 10px 16px; padding-bottom: max(10px, env(safe-area-inset-bottom)); background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }
  .nav-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #555; background: var(--surface2); color: #ddd; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
  .nav-btn.primary    { background: var(--accent); border-color: var(--accent); color: #000; }
  .nav-btn.finish-btn { background: var(--done);   border-color: var(--done);   color: #000; }
  .nav-btn:active { opacity: 0.75; }

  /* ── DONE ── */
  #done { align-items: center; justify-content: center; padding: 40px 24px; gap: 20px; text-align: center; }
  .done-icon  { font-size: 64px; animation: pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
  @keyframes pop { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }
  .done-title { font-family: 'Barlow Condensed', sans-serif; font-size: 48px; font-weight: 900; text-transform: uppercase; line-height: 1; color: var(--done); }
  .done-sub   { font-size: 13px; color: var(--muted); }
  .done-sync  { font-size: 11px; }
  .done-sync.ok   { color: var(--done); }
  .done-sync.err  { color: var(--accent2); }
  .done-sync.busy { color: var(--warn); }
  .done-summary { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; width: 100%; text-align: left; }
  .done-summary h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .summary-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .lift-name { color: var(--muted); }
  .summary-row .lift-sets { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; }
  .done-btn-row { display: flex; gap: 10px; width: 100%; }
  .done-home-btn { flex: 1; padding: 14px; border-radius: 12px; background: var(--accent); border: none; color: #000; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
  .done-prog-btn { flex: 1; padding: 14px; border-radius: 12px; background: var(--surface2); border: 1px solid #555; color: #ddd; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }

  /* ── PROGRESS SCREEN ── */
  .prog-header { padding: 16px 20px 12px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .prog-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; text-transform: uppercase; }
  .prog-title span { color: var(--accent); }
  .prog-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }

  /* ── CHARTS ── */
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .chart-card h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  canvas { width: 100% !important; display: block; }
  .no-data { font-size: 13px; color: var(--muted); padding: 12px 0; }

  /* pace chart */
  .pace-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .pace-header h3 { margin-bottom: 0; }
  .pace-status { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 6px; }
  .pace-status.ok      { color: var(--done);   background: rgba(58,255,138,0.12); }
  .pace-status.plateau { color: var(--warn);   background: rgba(255,184,48,0.12); }
  .pace-legend { display: flex; gap: 14px; align-items: center; margin-top: 8px; font-size: 11px; color: var(--muted); }
  .pace-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

  /* progress track bars */
  .track-grid { display: flex; flex-direction: column; gap: 12px; }
  .track-row  { display: flex; flex-direction: column; gap: 4px; }
  .track-header { display: flex; justify-content: space-between; align-items: baseline; }
  .track-lift { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .track-nums { font-size: 11px; color: var(--muted); }
  .track-bar-bg { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .track-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .track-label { font-size: 11px; color: var(--muted); }

  /* ── LOGIN ── */
  #login { align-items: center; justify-content: center; padding: 40px 24px; gap: 20px; }
  .login-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 36px; text-transform: uppercase; line-height: 1; text-align: center; }
  .login-title span { color: var(--accent); }
  .login-sub { font-size: 14px; color: var(--muted); text-align: center; }
  .login-form { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 300px; }
  .login-input { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; font-family: 'Barlow', sans-serif; font-size: 16px; color: var(--text); outline: none; width: 100%; }
  .login-input:focus { border-color: var(--accent); }
  .login-input::placeholder { color: #666; }
  .login-btn { padding: 14px; border-radius: 10px; background: var(--accent); border: none; color: #000; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
  .login-btn:active { opacity: 0.75; }
  .login-error { font-size: 13px; color: var(--accent2); text-align: center; min-height: 18px; }
  .user-info { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .user-info strong { color: var(--accent); }
  .switch-user-btn { background: none; border: 1px solid #555; color: var(--muted); border-radius: 6px; padding: 3px 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; margin-left: 8px; }
  .switch-user-btn:active { background: #2a2a2a; }
</style>
</head>
<body>

<div id="login" class="screen active">
  <div class="login-title"><span>Training</span> Log</div>
  <div class="login-sub">Enter your username and PIN</div>
  <div class="login-form">
    <input class="login-input" id="loginUser" type="text" placeholder="Username" autocapitalize="none" autocorrect="off">
    <input class="login-input" id="loginPin" type="password" inputmode="numeric" maxlength="4" placeholder="PIN (4 digits)">
    <button class="login-btn" onclick="doLogin()">Login</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="home" class="screen">
  <div class="home-header">
    <h1><span>Training</span> Log</h1>
    <p>12-week 5/3/1 · Tue / Thu / Sat</p>
    <div class="user-info" id="userInfo">Logged in as: <strong id="userDisplay"></strong><button class="switch-user-btn" onclick="switchUser()">Switch User</button></div>
    <div class="sync-status" id="syncStatus"></div>
    <div style="font-size:10px;color:#888;margin-top:2px;">v2.0</div>
    <button onclick="openProgress()" style="margin-top:10px;width:100%;padding:10px;border-radius:10px;background:var(--surface2);border:1px solid #555;color:#ddd;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;">📈 Progress Reports</button>
  </div>
  <div class="week-list" id="weekList"></div>
</div>

<div id="session" class="screen">
  <div class="session-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="session-title">
      <h2 id="sessionTitle">Week <span>1</span></h2>
      <p id="sessionSub"></p>
    </div>
    <button class="reset-btn" onclick="resetDay()" title="Reset this session">⟳ Reset</button>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
  <div class="ex-nav" id="exNav"></div>
  <div class="ex-content" id="exContent"></div>
  <div class="session-footer" id="sessionFooter"></div>
</div>

<div id="done" class="screen">
  <div class="done-icon">💪</div>
  <div class="done-title">Session Done</div>
  <div class="done-sub" id="doneSub"></div>
  <div class="done-sync" id="doneSync"></div>
  <div class="done-summary" id="doneSummary"></div>
  <div class="done-btn-row">
    <button class="done-home-btn" onclick="goHome()">← Home</button>
    <button class="done-prog-btn" onclick="openProgress()">📈 Progress</button>
  </div>
</div>

<div id="progress" class="screen">
  <div class="prog-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="prog-title"><span>Progress</span> Reports</div>
  </div>
  <div class="prog-body" id="progBody"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// CONFIG — update WORKER_URL if you rename your Cloudflare Worker
// ══════════════════════════════════════════════════════════════════
const WORKER_URL = 'https://gym-log-api.arek-baranowski.workers.dev';

// ══════════════════════════════════════════════════════════════════
// MULTIUSER AUTH
// ══════════════════════════════════════════════════════════════════
let CURRENT_USER = null;

async function doLogin(){
  const username = document.getElementById('loginUser').value.trim();
  const pin      = document.getElementById('loginPin').value.trim();
  const errEl    = document.getElementById('loginError');
  errEl.textContent = '';

  if(!username || !pin){ errEl.textContent = 'Please enter both username and PIN'; return; }

  try{
    const res = await fetch(WORKER_URL + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, pin }),
    });
    const data = await res.json();
    if(!data.ok){
      errEl.textContent = data.error || 'Invalid username or PIN';
      return;
    }
    CURRENT_USER = username.toLowerCase();
    document.getElementById('userDisplay').textContent = CURRENT_USER;
    // Clear login form
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPin').value = '';
    // Load user data and show home
    loadLocal();
    renderHome();
    showScreen('home');
    loadFromGitHub().then(()=>renderHome());
  } catch(e){
    errEl.textContent = 'Connection error — check your network';
  }
}

function switchUser(){
  CURRENT_USER = null;
  S = { week:null, day:0, exIdx:0, reps:{}, dayDone:{} };
  LOG = { sessions:[] };
  showScreen('login');
}

// Allow Enter key to submit login
document.addEventListener('keydown', function(e){
  if(e.key === 'Enter' && document.getElementById('login').classList.contains('active')){
    doLogin();
  }
});

// ══════════════════════════════════════════════════════════════════
// 12-WEEK TARGETS (for progress tracking)
// ══════════════════════════════════════════════════════════════════
const TARGETS = { Squat:100, Bench:80, Deadlift:100, OHP:45 };

// ══════════════════════════════════════════════════════════════════
// PROGRAMME DATA
// ══════════════════════════════════════════════════════════════════
const DAYS = ['Tue','Thu','Sat'];

const WEEKS = [
  { w:1,  cycle:1, type:"Week 1 — 5s",      deload:false,
    lifts:[
      { name:"Squat",    sets:[{kg:50,t:"5"},{kg:57.5,t:"5"},{kg:65,t:"5+"}] },
      { name:"Bench",    sets:[{kg:40,t:"5"},{kg:47.5,t:"5"},{kg:52.5,t:"5+"}] },
      { name:"Deadlift", sets:[{kg:47.5,t:"5"},{kg:55,t:"5"},{kg:60,t:"5+"}] },
      { name:"OHP",      sets:[{kg:22.5,t:"5"},{kg:27.5,t:"5"},{kg:30,t:"5+"}] },
    ],
    pu:{ sets:5, note:"5×5 reps", bands:["1× Thick band","2× Thick band","2× Thick band"] }
  },
  { w:2,  cycle:1, type:"Week 2 — 3s",      deload:false,
    lifts:[
      { name:"Squat",    sets:[{kg:55,t:"3"},{kg:62.5,t:"3"},{kg:70,t:"3+"}] },
      { name:"Bench",    sets:[{kg:45,t:"3"},{kg:50,t:"3"},{kg:57.5,t:"3+"}] },
      { name:"Deadlift", sets:[{kg:50,t:"3"},{kg:57.5,t:"3"},{kg:65,t:"3+"}] },
      { name:"OHP",      sets:[{kg:25,t:"3"},{kg:30,t:"3"},{kg:32.5,t:"3+"}] },
    ],
    pu:{ sets:5, note:"5×6 reps", bands:["1× Thick band","2× Thick band","2× Thick band"] }
  },
  { w:3,  cycle:1, type:"Week 3 — 5/3/1",   deload:false,
    lifts:[
      { name:"Squat",    sets:[{kg:57.5,t:"5"},{kg:65,t:"3"},{kg:72.5,t:"1+"}] },

// ══════════════════════════════════════════════════════════════════
// STATE
// reps: { "w-d-ei-si": repsLogged }  (in-memory during session)
// log:  persisted JSON from GitHub  { sessions: [...] }
// ══════════════════════════════════════════════════════════════════
let S = { week:null, day:0, exIdx:0, reps:{}, dayDone:{} };
let LOG = { sessions:[] };  // full log loaded from GitHub on startup

function rk(w,d,e,s){ return `${w}-${d}-${e}-${s}`; }
function dk(w,d){ return `${w}-${d}`; }
function fkg(v){ return v%1===0 ? v : v.toFixed(1); }

// ── LOCAL CACHE (per-user, fallback when offline) ─────────────────
function localKey(){ return 'gymlog_' + (CURRENT_USER || 'anon'); }
function saveLocal(){
  try{ localStorage.setItem(localKey(), JSON.stringify({reps:S.reps, dayDone:S.dayDone, log:LOG})); }catch(e){}
}
function loadLocal(){
  try{
    const d = JSON.parse(localStorage.getItem(localKey())||'{}');
    S.reps    = d.reps    || {};
    S.dayDone = d.dayDone || {};
    LOG       = d.log     || { sessions:[] };
  }catch(e){}
}

// ── GITHUB API via WORKER ─────────────────────────────────────────
async function loadFromGitHub(){
  setSyncStatus('busy','⟳ Loading from GitHub…');
  try{
    const res  = await fetch(WORKER_URL + '?user=' + encodeURIComponent(CURRENT_USER));
    const data = await res.json();
    LOG = data;
    // Reconstruct S.reps and S.dayDone from log
    S.reps = {}; S.dayDone = {};
    LOG.sessions.forEach(session => {
      const di = DAYS.indexOf(session.day);
      if(di < 0) return;
      S.dayDone[dk(session.week, di)] = true;
      // Restore barbell lift reps
      session.lifts.forEach((lift, ei) => {
        lift.reps.forEach((r, si) => {
          if(r !== null) S.reps[rk(session.week, di, ei, si)] = r;
        });
      });
      // Restore pull-up reps (stored at exIdx 4)
      if(session.pullups?.reps){
        session.pullups.reps.forEach((r, si) => {
          if(r !== null) S.reps[rk(session.week, di, 4, si)] = r;
        });
      }
    });
    saveLocal();
    setSyncStatus('ok','✓ Data synced with GitHub');
  } catch(e){
    setSyncStatus('err','⚠ Offline — using local data');
    loadLocal();
  }
}

async function saveToGitHub(){
  setDoneSync('busy','⟳ Saving to GitHub…');
  try{
    const res = await fetch(WORKER_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user: CURRENT_USER, data: LOG }),
    });
    const result = await res.json();
    if(result.ok){
      setDoneSync('ok','✓ Saved to GitHub');
      setSyncStatus('ok','✓ Data synced with GitHub');
    } else {
      setDoneSync('err','⚠ Save failed — data kept locally');
    }
  } catch(e){
    setDoneSync('err','⚠ Offline — saved locally only');
  }
}

function setSyncStatus(cls, msg){
  const el = document.getElementById('syncStatus');
  if(el){ el.className='sync-status '+cls; el.textContent=msg; }
}
function setDoneSync(cls, msg){
  const el = document.getElementById('doneSync');
  if(el){ el.className='done-sync '+cls; el.textContent=msg; }
}

// ── SCREEN ROUTING ────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById(id).scrollTop = 0;
}

// ── HOME ──────────────────────────────────────────────────────────
function renderHome(){
  const list = document.getElementById('weekList');
  list.innerHTML = '';
  let lastC = null;
  WEEKS.forEach(wk => {
    if(wk.cycle !== lastC){
      lastC = wk.cycle;
      const lbl = document.createElement('div');
      lbl.className = 'cycle-label';
      lbl.textContent = `── Cycle ${wk.cycle} ──`;
      list.appendChild(lbl);
    }
    const doneCount = DAYS.reduce((n,_,di)=>n+(S.dayDone[dk(wk.w,di)]?1:0),0);
    const allDone   = doneCount===3;
    const isCurrent = !allDone && WEEKS.slice(0,wk.w-1).every(w=>DAYS.every((_,di)=>S.dayDone[dk(w.w,di)]));
    const dots = DAYS.map((_,di)=>{
      const done=S.dayDone[dk(wk.w,di)];
      const hasAny=Object.keys(S.reps).some(k=>k.startsWith(`${wk.w}-${di}-`));
      return `<div class="dot${done?' done':hasAny?' partial':''}"></div>`;
    }).join('');
    const btn = document.createElement('button');
    btn.className='week-btn'+(wk.deload?' deload':'')+(allDone?' complete':'')+(isCurrent&&!allDone?' current':'');
    btn.innerHTML=`<div class="week-num">${wk.w}</div>
      <div class="week-info">
        <div class="week-type">${wk.type}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px;font-size:12px;color:var(--muted)">
          <div class="week-dots">${dots}</div><span>Tue · Thu · Sat</span>
        </div>
      </div>`;
    btn.onclick=()=>openSession(wk.w);
    list.appendChild(btn);
  });
}

function goHome(){ renderHome(); showScreen('home'); }

// ── RESET SESSION ─────────────────────────────────────────────────
function resetDay(){
  const dayName = DAYS[S.day];
  const confirmed = confirm(`Reset Week ${S.week} · ${dayName}?\n\nAll logged data for this session will be deleted and it will be unlocked for re-logging.`);
  if(!confirmed) return;

  // Remove from log
  LOG.sessions = LOG.sessions.filter(s => !(s.week === S.week && s.day === dayName));

  // Clear reps from state for this week/day
  const prefix = `${S.week}-${S.day}-`;
  Object.keys(S.reps).forEach(k => { if(k.startsWith(prefix)) delete S.reps[k]; });

  // Unlock the day
  delete S.dayDone[dk(S.week, S.day)];

  saveLocal();
  saveToGitHub();

  // Re-render session so it shows as fresh
  renderDayTabs();
  renderNav();
  renderEx();
}

// ── SESSION ───────────────────────────────────────────────────────
function openSession(w){
  S.week=w; S.exIdx=0;
  S.day=DAYS.findIndex((_,di)=>!S.dayDone[dk(w,di)]);
  if(S.day===-1) S.day=0;
  const wk=WEEKS[w-1];
  document.getElementById('sessionTitle').innerHTML=`Week <span>${w}</span>`;
  document.getElementById('sessionSub').textContent=wk.type;
  renderDayTabs(); renderNav(); renderEx();
  showScreen('session');
}

function renderDayTabs(){
  const tabs=document.getElementById('dayTabs'); tabs.innerHTML='';
  DAYS.forEach((day,di)=>{
    const done=S.dayDone[dk(S.week,di)];
    const tab=document.createElement('button');
    tab.className='day-tab'+(di===S.day?' active':'')+(done?' day-done':'');
    tab.innerHTML=`${day}<span class="tab-check">✓</span>`;
    tab.onclick=()=>{S.day=di;S.exIdx=0;renderDayTabs();renderNav();renderEx();};
    tabs.appendChild(tab);
  });
}

function isExDone(w,d,ei){
  const wk=WEEKS[w-1];
  const n=ei<4?wk.lifts[ei].sets.length:wk.pu.sets;
  return Array.from({length:n},(_,si)=>S.reps[rk(w,d,ei,si)]).every(v=>v!==undefined);
}

function renderNav(){
  const wk=WEEKS[S.week-1]; const nav=document.getElementById('exNav'); nav.innerHTML='';
  [...wk.lifts.map(l=>l.name),'Pull-ups'].forEach((name,i)=>{
    const p=document.createElement('button');
    p.className='ex-pill'+(i===S.exIdx?' active':'')+(isExDone(S.week,S.day,i)&&i!==S.exIdx?' done-pill':'');
    p.textContent=name;
    p.onclick=()=>{S.exIdx=i;renderNav();renderEx();};
    nav.appendChild(p);
  });
}

function puTotal(){
  const wk=WEEKS[S.week-1]; let t=0;
  for(let si=0;si<wk.pu.sets;si++){const v=S.reps[rk(S.week,S.day,4,si)];if(v)t+=v;}
  return t;
}

function renderEx(){
  const wk=WEEKS[S.week-1]; const ei=S.exIdx;
  const content=document.getElementById('exContent');
  const footer=document.getElementById('sessionFooter');
  content.innerHTML='';

  if(ei<4){
    const lift=wk.lifts[ei];
    const nameEl=document.createElement('div'); nameEl.className='ex-name'; nameEl.textContent=lift.name;
    content.appendChild(nameEl);
    const sc=document.createElement('div'); sc.className='sets-container';
    lift.sets.forEach((set,si)=>{
      const v=S.reps[rk(S.week,S.day,ei,si)];
      const card=document.createElement('div');
      card.className='set-card'+(v!==undefined?' set-done':'');
      card.innerHTML=`<div class="set-left">
          <div class="set-label">Set ${si+1}</div>
          <div class="set-weight">${fkg(set.kg)}<small style="font-size:16px;color:var(--muted)"> kg</small></div>
          <div class="set-target">Target: ${set.t} reps</div>
        </div>
        <div class="rep-counter">
          <button class="rep-btn" onclick="chg(${ei},${si},-1)">−</button>
          <div class="rep-display${v!==undefined?' has-reps':''}" id="rd-${ei}-${si}">${v!==undefined?v:'—'}</div>
          <button class="rep-btn" onclick="chg(${ei},${si},1)">+</button>
        </div>`;
      sc.appendChild(card);
    });
    content.appendChild(sc);
  } else {
    const pu=wk.pu; const band=pu.bands[S.day];
    const nameEl=document.createElement('div'); nameEl.className='ex-name'; nameEl.textContent='Pull-ups';
    content.appendChild(nameEl);
    let sHtml='';
    for(let si=0;si<pu.sets;si++){
      const v=S.reps[rk(S.week,S.day,4,si)];
      sHtml+=`<div class="pullup-set"><div class="pullup-set-label">Set ${si+1}</div>
        <div class="rep-counter">
          <button class="rep-btn" onclick="chg(4,${si},-1)">−</button>
          <div class="rep-display${v!==undefined?' has-reps':''}" id="rd-4-${si}">${v!==undefined?v:'—'}</div>
          <button class="rep-btn" onclick="chg(4,${si},1)">+</button>
        </div></div>`;
    }
    const card=document.createElement('div'); card.className='pullup-card';
    card.innerHTML=`<div class="pullup-header">
        <div class="pullup-target-label">Today's target</div>
        <div class="pullup-target-val">${pu.note}</div>
        <div class="pullup-band-tag">🎽 ${band}</div>
      </div>
      <div class="pullup-sets">${sHtml}</div>
      <div class="pullup-total">
        <div class="pullup-total-label">Total logged</div>
        <div class="pullup-total-val" id="puTotal">${puTotal()}</div>
      </div>`;
    content.appendChild(card);
  }

  footer.innerHTML='';
  const total=wk.lifts.length+1;
  if(ei>0){
    const b=document.createElement('button'); b.className='nav-btn';
    b.textContent='← Back'; b.onclick=()=>{S.exIdx--;renderNav();renderEx();};
    footer.appendChild(b);
  }
  if(ei<total-1){
    const b=document.createElement('button'); b.className='nav-btn primary';
    b.textContent='Next →'; b.onclick=()=>{S.exIdx++;renderNav();renderEx();};
    footer.appendChild(b);
  } else {
    const b=document.createElement('button'); b.className='nav-btn finish-btn';
    b.textContent='✓ Finish '+DAYS[S.day]; b.onclick=finish;
    footer.appendChild(b);
  }
}

function chg(ei,si,d){
  const k=rk(S.week,S.day,ei,si);
  const cur=S.reps[k]!==undefined?S.reps[k]:0;
  const nv=Math.max(0,cur+d);
  if(nv===0&&cur===0) return;
  S.reps[k]=nv; saveLocal();
  const el=document.getElementById(`rd-${ei}-${si}`);
  if(el){el.textContent=nv;el.classList.add('has-reps');}
  if(ei===4){const t=document.getElementById('puTotal');if(t)t.textContent=puTotal();}
  if(ei<4){
    const cards=document.querySelectorAll('.set-card');
    WEEKS[S.week-1].lifts[ei].sets.forEach((_,s)=>{
      if(cards[s]&&S.reps[rk(S.week,S.day,ei,s)]!==undefined) cards[s].classList.add('set-done');
    });
  }
  renderNav();
}

// FINISH SESSION — build log entry, save, show done screen
// ══════════════════════════════════════════════════════════════════
function finish(){
  const wk = WEEKS[S.week-1];
  S.dayDone[dk(S.week,S.day)] = true;

  const liftData = wk.lifts.map((lift,ei)=>({
    name: lift.name,
    sets: lift.sets.map(s=>s.kg),
    reps: lift.sets.map((_,si)=>S.reps[rk(S.week,S.day,ei,si)]??null),
  }));
  const puReps = Array.from({length:wk.pu.sets},(_,si)=>S.reps[rk(S.week,S.day,4,si)]??null);

  const sessionRecord = {
    week: S.week, day: DAYS[S.day],
    date: new Date().toISOString().split('T')[0],
    lifts: liftData,
    pullups: { sets: wk.pu.sets, reps: puReps, total: puTotal() },
  };

  LOG.sessions = LOG.sessions.filter(s=>!(s.week===S.week&&s.day===DAYS[S.day]));
  LOG.sessions.push(sessionRecord);
  saveLocal();

  showDoneScreen(sessionRecord, wk);
  saveToGitHub();
}

  document.getElementById('doneSub').textContent = `Week ${wk.w} · ${session.day}`;
  setDoneSync('busy','⟳ Saving to GitHub…');

  // Session summary table
  let html = '<h3>What you logged</h3>';
  session.lifts.forEach(lift=>{
    const sets = lift.reps.map(r=>r!==null?r:'–').join(' / ');
    html += `<div class="summary-row"><span class="lift-name">${lift.name}</span><span class="lift-sets">${sets}</span></div>`;
  });
  html += `<div class="summary-row"><span class="lift-name">Pull-ups</span><span class="lift-sets">${session.pullups.reps.map(r=>r!==null?r:'–').join(' / ')} = ${session.pullups.total}</span></div>`;
  document.getElementById('doneSummary').innerHTML = html;

  showScreen('done');
}

// PROGRESS SCREEN
// ══════════════════════════════════════════════════════════════════
function openProgress(){
  const body = document.getElementById('progBody');
  body.innerHTML = '';

  const sorted = [...LOG.sessions].sort((a,b)=>{
    if(a.week!==b.week) return a.week-b.week;
    return DAYS.indexOf(a.day)-DAYS.indexOf(b.day);
  });

  // ── 1. Snapshot progress bars ─────────────────────────────────
  const trackCard = document.createElement('div'); trackCard.className='chart-card';
  trackCard.innerHTML = '<h3>12-week targets — where are you now?</h3><div class="track-grid" id="trackGrid"></div>';
  body.appendChild(trackCard);

  // ── 2. Per-exercise pace charts ───────────────────────────────
  // Build the full planned programme curve once, shared by all charts
  // plannedCurve[exerciseName] = array of { label, value } for all 36 sessions
  const plannedCurve = buildPlannedCurve();

  const exercises = [
    { name:'Squat',    color:'#e8ff3a' },
    { name:'Bench',    color:'#3aff8a' },
    { name:'Deadlift', color:'#ff6b35' },
    { name:'OHP',      color:'#a78bfa' },
    { name:'Pull-ups', color:'#38bdf8' },
  ];

  exercises.forEach((ex, i) => {
    const card = document.createElement('div'); card.className='chart-card';
    const canvasId = `paceChart_${i}`;

    // Plateau detection: last 3+ logged values with no improvement
    const actualPoints = getActualPoints(sorted, ex.name);
    const plateauMsg   = detectPlateau(actualPoints);
    const statusHtml   = plateauMsg
      ? `<div class="pace-status plateau">${plateauMsg}</div>`
      : actualPoints.length >= 2
        ? `<div class="pace-status ok">↑ Progressing</div>`
        : '';

    card.innerHTML = `
      <div class="pace-header">
        <h3>${ex.name}</h3>
        ${statusHtml}
      </div>
      ${sorted.length
        ? `<canvas id="${canvasId}" height="160"></canvas>
           <div class="pace-legend">
             <span class="pace-dot" style="background:${ex.color}"></span><span>Actual</span>
             <span class="pace-dot" style="background:#444"></span><span>Programme plan</span>
           </div>`
        : '<div class="no-data">No sessions logged yet.</div>'
      }`;
    body.appendChild(card);
  });

  // ── 3. Rep performance vs target ─────────────────────────────
  const repCard = document.createElement('div'); repCard.className='chart-card';
  repCard.innerHTML = '<h3>Top set reps — last session per lift</h3>'
    + (sorted.length ? '<canvas id="repChart" height="160"></canvas>' : '<div class="no-data">No sessions logged yet.</div>');
  body.appendChild(repCard);

  requestAnimationFrame(()=>{
    drawTrackBars(sorted);
    if(sorted.length){
      exercises.forEach((ex, i) => {
        drawPaceChart(`paceChart_${i}`, ex.name, ex.color, sorted, plannedCurve[ex.name]);
      });
      drawRepChart(sorted);
    }
  });

  showScreen('progress');
}

// ── Build the full planned programme curve for all exercises ──────
// Returns { 'Squat': [{label, value}, ...], 'Pull-ups': [...], ... }
// Each entry = one of the 36 sessions (12 weeks × 3 days)
function buildPlannedCurve(){
  const curve = { Squat:[], Bench:[], Deadlift:[], OHP:[], 'Pull-ups':[] };
  WEEKS.forEach(wk => {
    DAYS.forEach(day => {
      const label = `W${wk.w} ${day}`;
      wk.lifts.forEach(lift => {
        curve[lift.name].push({ label, value: lift.sets[lift.sets.length-1].kg });
      });
      // Parse planned pull-up total from note e.g. "5×7 reps" → 5×7 = 35
      const puTotal = parsePuTotal(wk.pu);
      curve['Pull-ups'].push({ label, value: puTotal });
    });
  });
  return curve;
}

// Parse planned pull-up total from pu object
// note format: "5×5 reps", "3×5 reps — easy" etc.
function parsePuTotal(pu){
  const match = pu.note.match(/(\d+)×(\d+)/);
  if(match) return parseInt(match[1]) * parseInt(match[2]);
  return pu.sets * 5; // fallback
}

// ── Extract actual logged data points for one exercise ────────────
function getActualPoints(sorted, name){
  return sorted.flatMap(s => {
    const label = `W${s.week} ${s.day}`;
    if(name === 'Pull-ups'){
      return s.pullups?.total > 0 ? [{ label, value: s.pullups.total }] : [];
    }
    const lift = s.lifts.find(l=>l.name===name);
    if(!lift) return [];
    const topKg = lift.sets[lift.sets.length-1];
    return topKg != null ? [{ label, value: topKg }] : [];
  });
}

// ── Plateau detection: flag if last N sessions show no improvement ─
// Returns a warning string or null
function detectPlateau(points){
  const WINDOW = 3; // sessions with no improvement = plateau
  if(points.length < WINDOW) return null;
  const recent = points.slice(-WINDOW).map(p=>p.value);
  const max = Math.max(...recent);
  const min = Math.min(...recent);
  if(max === min) return `⚠ Plateau — no improvement in last ${WINDOW} sessions`;
  return null;
}

// ── Per-exercise pace chart ────────────────────────────────────────
// Plots actual (coloured line) vs planned programme (grey dashed)
// x-axis = all 36 sessions; only logged sessions show actual dots
function drawPaceChart(canvasId, name, color, sorted, planned){
  const canvas = document.getElementById(canvasId); if(!canvas) return;
  const ctx = canvas.getContext('2d');

  const actual = getActualPoints(sorted, name);

  // Build a lookup so we can place actual points on the correct x position
  const actualMap = {};
  actual.forEach(p => { actualMap[p.label] = p.value; });

  const xLabels   = planned.map(p=>p.label);
  const planVals  = planned.map(p=>p.value);
  // actual array aligned to planned x-axis (null where not logged yet)
  const actualVals = planned.map(p=>actualMap[p.label]??null);

  const W = canvas.offsetWidth; const H = canvas.offsetHeight||160;
  canvas.width=W*2; canvas.height=H*2; ctx.scale(2,2);
  ctx.clearRect(0,0,W,H);

  const pad={l:30,r:10,t:10,b:28};
  const allVals = [...planVals, ...actual.map(p=>p.value)];
  const minVal  = Math.min(...allVals)*0.88;
  const maxVal  = Math.max(...allVals)*1.08;
  const n       = xLabels.length;
  const xStep   = (W-pad.l-pad.r)/(n-1);

  function yx(v){ return pad.t+(1-(v-minVal)/(maxVal-minVal))*(H-pad.t-pad.b); }
  function xx(i){ return pad.l+i*xStep; }

  // Gridlines + y labels
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1;
  [0,0.25,0.5,0.75,1].forEach(f=>{
    const v = minVal+(maxVal-minVal)*f;
    const y = yx(v);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#aaa'; ctx.font='9px Barlow'; ctx.textAlign='right';
    ctx.fillText(name==='Pull-ups'?Math.round(v):Math.round(v)+'kg', pad.l-3, y+3);
  });

  // Week boundary markers (every 3 sessions = 1 week)
  ctx.strokeStyle='#222'; ctx.lineWidth=1;
  for(let i=3; i<n; i+=3){
    const x=xx(i);
    ctx.beginPath(); ctx.moveTo(x,pad.t); ctx.lineTo(x,H-pad.b); ctx.stroke();
  }

  // Planned programme line (grey dashed)
  ctx.strokeStyle='#444'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
  ctx.beginPath();
  planVals.forEach((v,i)=>{ i===0?ctx.moveTo(xx(i),yx(v)):ctx.lineTo(xx(i),yx(v)); });
  ctx.stroke(); ctx.setLineDash([]);

  // Actual line (solid, coloured) — only draw between logged points
  ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.lineJoin='round';
  ctx.beginPath(); let first=true;
  actualVals.forEach((v,i)=>{
    if(v===null){ first=true; return; }
    first?(ctx.moveTo(xx(i),yx(v)),first=false):ctx.lineTo(xx(i),yx(v));
  });
  ctx.stroke();

  // Actual dots
  actualVals.forEach((v,i)=>{
    if(v===null) return;
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.arc(xx(i),yx(v),3,0,Math.PI*2); ctx.fill();
  });

  // X-axis: week labels only (W1, W2 … W12) — one per 3 sessions
  ctx.fillStyle='#aaa'; ctx.font='9px Barlow'; ctx.textAlign='center';
  for(let i=0; i<n; i+=3){
    ctx.fillText(`W${Math.floor(i/3)+1}`, xx(i), H-4);
  }
}

// ── Track bars: best top set logged vs 12-week target ─────────────
function drawTrackBars(sorted){
  const grid = document.getElementById('trackGrid'); if(!grid) return;
  grid.innerHTML = '';

  // ── Barbell lifts ──
  const liftNames = ['Squat','Bench','Deadlift','OHP'];
  liftNames.forEach(name=>{
    const target = TARGETS[name];
    let bestKg = 0;
    sorted.forEach(s=>{
      const lift = s.lifts.find(l=>l.name===name); if(!lift) return;
      const topKg = lift.sets[lift.sets.length-1];
      if(topKg > bestKg) bestKg = topKg;
    });
    const lastSession = [...sorted].reverse().find(s=>s.lifts.find(l=>l.name===name));
    const currentWeekNum = lastSession ? lastSession.week : 1;
    const wk = WEEKS[currentWeekNum-1];
    const plannedKg = wk?.lifts.find(l=>l.name===name)?.sets[2]?.kg ?? bestKg;
    const pct = bestKg > 0 ? Math.min(100, Math.round((bestKg/target)*100)) : 0;
    const diff = bestKg - plannedKg;
    const color = bestKg===0 ? '#444' : diff>=0 ? '#3aff8a' : diff>=-5 ? '#ffb830' : '#ff6b35';
    const status = bestKg===0 ? 'Not started' : diff>=0 ? '✓ On track' : diff>=-5 ? '~ Close' : '↓ Behind plan';
    grid.innerHTML += `
      <div class="track-row">
        <div class="track-header">
          <span class="track-lift">${name}</span>
          <span class="track-nums">${bestKg>0?bestKg+'kg best':'–'} → ${target}kg target</span>
        </div>
        <div class="track-bar-bg">
          <div class="track-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="track-label">${pct}% of target · ${status}</div>
      </div>`;
  });

  // ── Pull-ups: best total reps in a single session vs Week 11 target (50) ──
  const puTarget = 50;
  let bestPuTotal = 0;
  let bestPuWeek = 1;
  sorted.forEach(s=>{
    if(s.pullups?.total > bestPuTotal){
      bestPuTotal = s.pullups.total;
      bestPuWeek  = s.week;
    }
  });
  const wkPu = WEEKS[bestPuWeek-1];
  const plannedPuTotal = wkPu ? parsePuTotal(wkPu.pu) : bestPuTotal;
  const puPct  = bestPuTotal > 0 ? Math.min(100, Math.round((bestPuTotal/puTarget)*100)) : 0;
  const puDiff = bestPuTotal - plannedPuTotal;
  const puColor  = bestPuTotal===0 ? '#444' : puDiff>=0 ? '#3aff8a' : puDiff>=-5 ? '#ffb830' : '#ff6b35';
  const puStatus = bestPuTotal===0 ? 'Not started' : puDiff>=0 ? '✓ On track' : puDiff>=-3 ? '~ Close' : '↓ Behind plan';
  grid.innerHTML += `
    <div class="track-row">
      <div class="track-header">
        <span class="track-lift">Pull-ups</span>
        <span class="track-nums">${bestPuTotal>0?bestPuTotal+' best total':'–'} → ${puTarget} target</span>
      </div>
      <div class="track-bar-bg">
        <div class="track-bar-fill" style="width:${puPct}%;background:${puColor}"></div>
      </div>
      <div class="track-label">${puPct}% of target · ${puStatus}</div>
    </div>`;
}

// ── Bar chart: top set actual reps vs target, last session per lift ─
function drawRepChart(sorted){
  const canvas = document.getElementById('repChart'); if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const liftNames = ['Squat','Bench','Deadlift','OHP'];
  const labels=[], actual=[], targets=[];

  // Barbell lifts
  liftNames.forEach(name=>{
    const last = [...sorted].reverse().find(s=>s.lifts.find(l=>l.name===name));
    if(!last) return;
    const lift = last.lifts.find(l=>l.name===name);
    const topRep = lift.reps[lift.reps.length-1];
    if(topRep===null) return;
    const wk = WEEKS[last.week-1];
    const planned = parseInt(wk?.lifts.find(l=>l.name===name)?.sets[2]?.t ?? '5');
    labels.push(name); actual.push(topRep); targets.push(planned);
  });

  // Pull-ups: use total reps vs planned total for that week
  const lastPu = [...sorted].reverse().find(s=>s.pullups?.total > 0);
  if(lastPu){
    const wk = WEEKS[lastPu.week-1];
    const plannedTotal = parsePuTotal(wk.pu);
    labels.push('Pull-ups');
    actual.push(lastPu.pullups.total);
    targets.push(plannedTotal);
  }

  if(!labels.length){
    ctx.fillStyle='#666'; ctx.font='13px Barlow';
    ctx.fillText('No rep data yet',10,30); return;
  }

  drawBarChart(ctx, canvas, labels, [
    { label:'Target', data:targets, color:'rgba(255,255,255,0.15)' },
    { label:'Actual',  data:actual,  color:'#e8ff3a' },
  ]);
}

// ── Minimal canvas helpers ──────────────────────────────────────────
function drawBarChart(ctx, canvas, labels, datasets){
  const W=canvas.offsetWidth; const H=canvas.offsetHeight||160;
  canvas.width=W*2; canvas.height=H*2; ctx.scale(2,2);
  ctx.clearRect(0,0,W,H);
  const pad={l:8,r:8,t:8,b:28};
  const n=labels.length; const groupW=(W-pad.l-pad.r)/n;
  const barW=groupW*0.35; const gap=groupW*0.05;
  const maxVal=Math.max(...datasets.flatMap(d=>d.data))*1.2||10;
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1;
  [0.25,0.5,0.75,1].forEach(f=>{
    const y=pad.t+(1-f)*(H-pad.t-pad.b);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#666'; ctx.font='10px Barlow'; ctx.textAlign='left';
    ctx.fillText(Math.round(f*maxVal),2,y+3);
  });
  datasets.forEach((ds,di)=>{
    ds.data.forEach((val,i)=>{
      const x=pad.l+i*groupW+di*(barW+gap);
      const barH=((val||0)/maxVal)*(H-pad.t-pad.b);
      const y=pad.t+(H-pad.t-pad.b)-barH;
      ctx.fillStyle=ds.color;
      ctx.beginPath(); ctx.roundRect(x,y,barW,barH,3); ctx.fill();
    });
  });
  ctx.fillStyle='#aaa'; ctx.font='10px Barlow'; ctx.textAlign='center';
  labels.forEach((lbl,i)=>{ ctx.fillText(lbl,pad.l+i*groupW+groupW/2,H-6); });
}
